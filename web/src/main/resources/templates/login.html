<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Tra cứu xét tuyển SGU 2026</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="header">
        <div class="container">
            <h1>🎓 Tra cứu xét tuyển <span>ĐH Sài Gòn 2026</span></h1>
            <nav>
                <a th:href="@{/tinhdiem}">📊 Công cụ tính điểm</a>
            </nav>
        </div>
    </div>

    <div class="login-wrapper">
        <div class="login-card">
            <h2>🔐 Tra cứu kết quả xét tuyển</h2>
            <p class="subtitle">Đăng nhập bằng số CCCD và mật khẩu (8 chữ số ngày sinh ddMMyyyy)</p>

            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Số CCCD:</label>
                    <input type="text" name="username" placeholder="Nhập số căn cước công dân" required autofocus>
                </div>
                <div class="form-group">
                    <label>Mật khẩu (ngày sinh ddMMyyyy):</label>
                    <input type="password" name="password" placeholder="VD: 15032005" required>
                </div>
                <button type="submit" class="btn btn-primary">Đăng nhập</button>
            </form>

            <div style="text-align:center; margin-top:20px;">
                <a th:href="@{/tinhdiem}">📊 Hoặc sử dụng Công cụ tính điểm tham khảo →</a>
            </div>
        </div>
    </div>

    <div class="footer">© 2026 Đại học Sài Gòn - Hệ thống tra cứu xét tuyển</div>
</body>
</html>
